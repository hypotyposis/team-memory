name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install all dependencies
        run: npm install

      - name: Build all packages
        run: npm run build

      - name: Lint dashboard
        run: npm run lint

      # E2E
      - name: Start backend for E2E
        working-directory: packages/backend
        run: node dist/index.js &
        env:
          PORT: 3456

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3456/health > /dev/null 2>&1; then
              echo "Backend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start"
          exit 1

      - name: Create E2E API key
        id: apikey
        working-directory: packages/backend
        run: |
          OUTPUT=$(npx tsx src/cli.ts create e2e-test)
          KEY=$(echo "$OUTPUT" | grep '^key=' | cut -d= -f2)
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Run E2E HTTP tests
        working-directory: e2e/scripts
        run: node team-memory-e2e-http-demo.mjs
        env:
          TEAM_MEMORY_BASE_URL: http://localhost:3456/api
          TEAM_MEMORY_API_KEY: ${{ steps.apikey.outputs.key }}
