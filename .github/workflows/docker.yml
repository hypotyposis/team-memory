name: Docker

on:
  push:
    branches: [main]
    tags: ['primitive-batch-*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v4

      - name: Derive batch number from tag
        id: batch
        run: |
          if [[ "$GITHUB_REF" == refs/tags/primitive-batch-* ]]; then
            BATCH="${GITHUB_REF#refs/tags/primitive-batch-}"
            echo "number=$BATCH" >> "$GITHUB_OUTPUT"
            echo "is_batch=true" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "is_batch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load for test)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: team-memory:ci
          build-args: |
            PRIMITIVE_BATCH=${{ steps.batch.outputs.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — /health responds 200
        run: |
          docker run -d --name tm-smoke -p 3456:3456 team-memory:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3456/health > /dev/null; then
              echo "Health check OK"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "Health check failed after 30s"
              docker logs tm-smoke
              exit 1
            fi
            sleep 1
          done
          BODY=$(curl -s http://127.0.0.1:3456/health)
          echo "Response: $BODY"
          STATUS=$(echo "$BODY" | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);process.exit(j.status==='ok'?0:1)})")
          docker logs tm-smoke
          docker stop tm-smoke
          docker rm tm-smoke

      - name: Compute image tags
        id: tags
        run: |
          TAGS="${IMAGE}:sha-${GITHUB_SHA}"
          if [ "${{ steps.batch.outputs.is_batch }}" = "true" ]; then
            TAGS="${TAGS}
          ${IMAGE}:latest
          ${IMAGE}:batch-${{ steps.batch.outputs.number }}"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Push image to GHCR
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PRIMITIVE_BATCH=${{ steps.batch.outputs.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
